# Поддержка энкодеров
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Увеличенный debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=2
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=2

# Увеличенный лимит комбо для Shift
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=20

CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=240
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=1
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# OLED 128x32 (SSD1306, I2C 0x3C) — shield Sofle + nice_oled
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_EXT_POWER=y

# RAW HID: время, громкость, раскладка с ПК (zmk-hid-host)
CONFIG_NICE_OLED_WIDGET_RAW_HID=y
CONFIG_USB_HID_DEVICE_COUNT=2
CONFIG_NICE_OLED_WIDGET_RAW_HID_LAYOUT_LIST="RU,US"

# Память под RAW HID + RGB underglow
CONFIG_LV_Z_MEM_POOL_SIZE=10000
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=3072

# Иконки модификаторов в стиле Windows
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y

CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Экспериментальные BLE-настройки для лучшей производительности
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
